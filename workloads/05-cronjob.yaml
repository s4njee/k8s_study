apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-report
  namespace: workloads-demo
spec:
  schedule: "0 3 * * *"
  timeZone: America/Chicago
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: report
              image: busybox:1.28
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  echo "running scheduled report";
                  date -u +"%Y-%m-%dT%H:%M:%SZ";
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
