apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-demo
  namespace: workloads-demo
spec:
  replicas: 3
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: web-demo
  template:
    metadata:
      labels:
        app: web-demo
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: registry.k8s.io/echoserver:1.10
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-demo
  namespace: workloads-demo
spec:
  selector:
    app: web-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
