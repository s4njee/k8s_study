apiVersion: batch/v1
kind: Job
metadata:
  name: one-off-maintenance
  namespace: workloads-demo
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      containers:
        - name: task
          image: busybox:1.28
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "running one-off maintenance";
              date -u +"%Y-%m-%dT%H:%M:%SZ";
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
