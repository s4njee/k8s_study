apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: docker-registry-certificate
  namespace: registry
spec:
  commonName: registry.example.com
  secretName: docker-registry-tls
  duration: 2160h
  renewBefore: 72h
  subject:
    organizations:
      - example
  dnsNames:
    - registry.example.com
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
