apiVersion: v1
kind: Secret
metadata:
  name: example-tls
  namespace: secrets-demo
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_PRIVATE_KEY
    -----END PRIVATE KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-demo-app
  namespace: secrets-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tls-demo-app
  template:
    metadata:
      labels:
        app: tls-demo-app
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          # Replace this placeholder with your real pinned application image.
          image: registry.example.com/demo-app:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tls-demo-service
  namespace: secrets-demo
spec:
  selector:
    app: tls-demo-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tls-demo
  namespace: secrets-demo
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - demo.example.com
      secretName: example-tls
  rules:
    - host: demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tls-demo-service
                port:
                  number: 80
