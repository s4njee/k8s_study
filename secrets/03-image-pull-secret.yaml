apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: secrets-demo
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "registry.example.com": {
          "username": "registry-user",
          "password": "replace-me",
          "auth": "cmVnaXN0cnktdXNlcjpyZXBsYWNlLW1l"
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: private-registry-sa
  namespace: secrets-demo
automountServiceAccountToken: false
imagePullSecrets:
  - name: registry-credentials
---
apiVersion: v1
kind: Pod
metadata:
  name: image-pull-secret-demo
  namespace: secrets-demo
spec:
  serviceAccountName: private-registry-sa
  automountServiceAccountToken: false
  containers:
    - name: app
      # Replace this placeholder with an image that actually lives in your private registry.
      image: registry.example.com/private-app:1.0.0
      imagePullPolicy: IfNotPresent
