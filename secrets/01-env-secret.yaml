apiVersion: v1
kind: Secret
metadata:
  name: app-env-secret
  namespace: secrets-demo
type: Opaque
stringData:
  DB_USERNAME: appuser
  DB_PASSWORD: replace-me
  API_TOKEN: replace-me-too
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-env-demo
  namespace: secrets-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-env-demo
  template:
    metadata:
      labels:
        app: secret-env-demo
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          # Replace this placeholder with your real pinned application image.
          image: registry.example.com/demo-app:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-env-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-env-secret
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-env-secret
                  key: API_TOKEN
          ports:
            - containerPort: 8080
