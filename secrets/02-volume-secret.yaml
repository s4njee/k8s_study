apiVersion: v1
kind: Secret
metadata:
  name: app-file-secret
  namespace: secrets-demo
type: Opaque
stringData:
  username: appuser
  password: replace-me
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CA_CERTIFICATE
    -----END CERTIFICATE-----
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-demo
  namespace: secrets-demo
spec:
  automountServiceAccountToken: false
  containers:
    - name: app
      # Replace this placeholder with your real pinned application image.
      image: registry.example.com/demo-app:1.0.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: app-secret-files
          mountPath: /etc/app-secrets
          readOnly: true
  volumes:
    - name: app-secret-files
      secret:
        secretName: app-file-secret
        defaultMode: 0400
        items:
          - key: username
            path: username
          - key: password
            path: password
          - key: ca.crt
            path: ca.crt
