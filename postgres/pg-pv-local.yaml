apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv-local
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /storage
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: storage
              operator: In
              values:
                - worker1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pv-claim
  namespace: postgres
spec:
  storageClassName: local-storage # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: postgres-pv-local
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
