apiVersion: apps/v1
kind: Deployment
metadata:
  name: rutorrent-primary # Sets Deployment name
  namespace: rtorrent-x
  labels:
    app: rutorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rutorrent
  template:
    metadata:
      labels:
        app: rutorrent
    spec:
      volumes:
        - name: rt-pv-data
          persistentVolumeClaim:
            claimName: rt-data-pvc
        - name: rt-pv-files
          persistentVolumeClaim:
            claimName: rt-files-pvc
      containers:
        - name: rutorrent
          image: 192.168.50.57:5001/rtorrent-rutorrent # Sets Image
          imagePullPolicy: "Always"
          ports:
            - containerPort: 8080 # Exposes container port
          volumeMounts:
            - mountPath: "/data"
              name: rt-pv-data
            - mountPath: "/downloads"
              name: rt-pv-files
          resources:
            requests:
              memory: "8000Mi"
            limits:
              memory: "16000Mi"
          envFrom:
            - configMapRef:
                name: rt-config
      imagePullSecrets:
        - name: registrypullsecret
---
apiVersion: v1
kind: Service
metadata:
  name: rutorrent-internal
  namespace: rtorrent-x
  labels:
    app: rutorrent
spec:
  type: ClusterIP
  ports:
    - port: 6888
      protocol: TCP
      name: "dht"
    - port: 8008
      protocol: TCP
      name: "xmlrpc"
    - port: 9008
      protocol: TCP
      name: "webdav"
  selector:
    app: rutorrent

---
apiVersion: v1
kind: Service
metadata:
  name: rutorrent-lb
  namespace: rtorrent-x
spec:
  selector:
    app: rutorrent
  ports:
    - port: 50008
      targetPort: 50008
      protocol: TCP
      name: "rt-inc"
    - protocol: TCP
      port: 9090
      targetPort: 8080
      name: "rt-web"
  type: LoadBalancer
status:
  loadBalancer:
    ingress:
      - ip: 192.168.50.57
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rt-config
  namespace: rtorrent-x
  labels:
    app: rutorrent
data:
  TZ: "US/Central"
  PUID: "1000"
  PGID: "1000"

  WAN_IP_CMD: "false"

  AUTH_DELAY: "0s"
  MEMORY_LIMIT: "256M"
  UPLOAD_MAX_SIZE: "16M"
  OPCACHE_MEM_SIZE: "128"
  MAX_FILE_UPLOADS: "50"
  REAL_IP_FROM: "0.0.0.0/32"
  REAL_IP_HEADER: "X-Forwarded-For"
  LOG_IP_VAR: "remote_addr"
  LOG_ACCESS: "true"

  XMLRPC_AUTHBASIC_STRING: "rTorrent XMLRPC restricted access"
  RUTORRENT_AUTHBASIC_STRING: "ruTorrent restricted access"
  WEBDAV_AUTHBASIC_STRING: "WebDAV restricted access"

  RT_LOG_LEVEL: "info"
  RT_LOG_EXECUTE: "false"
  RT_LOG_XMLRPC: "false"

  RU_HTTP_USER_AGENT: "Mozilla/5.0 (Windows NT 6.0; WOW64; rv:12.0) Gecko/20100101 Firefox/12.0"
  RU_HTTP_TIME_OUT: "30"
  RU_HTTP_USE_GZIP: "true"
  RU_RPC_TIME_OUT: "5"
  RU_LOG_RPC_CALLS: "false"
  RU_LOG_RPC_FAULTS: "true"
  RU_PHP_USE_GZIP: "false"
  RU_PHP_GZIP_LEVEL: "2"
  RU_SCHEDULE_RAND: "10"
  RU_LOG_FILE: "/data/rutorrent/rutorrent.log"
  RU_DO_DIAGNOSTIC: "true"
  RU_SAVE_UPLOADED_TORRENTS: "true"
  RU_OVERWRITE_UPLOADED_TORRENTS: "false"
  RU_FORBID_USER_SETTINGS: "false"
  RU_LOCALE: "UTF8"
  RT_DHT_PORT: "6888"
  XMLRPC_PORT: "8008"
  RUTORRENT_PORT: "8080"
  WEBDAV_PORT: "9008"
  RT_INC_PORT: "50008"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rt-data-pv
spec:
  storageClassName: nfs-client
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /srv/nfs/raid6/rt/publicdata/
    server: 192.168.50.57
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rt-data-pvc
  namespace: rtorrent-x
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: "rt-data-pv"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rt-files-pv
spec:
  storageClassName: nfs-client
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /srv/nfs/raid6/porn
    server: 192.168.50.57
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rt-files-pvc
  namespace: rtorrent-x
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Ti
  volumeName: "rt-files-pv"
