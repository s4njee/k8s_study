# ResourceQuota and LimitRange
#
# ResourceQuota caps total resource consumption for the namespace.
# LimitRange sets default and maximum values for individual containers.
# Together they prevent a single team or workload from consuming
# disproportionate cluster resources.
#
# Apply after the namespace exists:
#   kubectl apply -f security/04-resource-quota.yaml

apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: security-demo
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: container-defaults
  namespace: security-demo
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
